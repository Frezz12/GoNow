services:
  postgres:
    image: postgres:17-alpine
    container_name: gonow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - gonow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [gonow]

  redis:
    image: redis:7-alpine
    container_name: gonow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - gonow-redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [gonow]

volumes:
  gonow-postgres-data:
  gonow-redis-data:

networks:
  gonow:
    name: gonow-network