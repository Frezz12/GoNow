services:
  postgres:
    image: postgres:17-alpine
    container_name: gonow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - gonow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [gonow]

  redis:
    image: redis:7-alpine
    container_name: gonow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - gonow-redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [gonow]

  minio:
    image: minio/minio:latest
    container_name: gonow-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - gonow-minio-data:/data
    networks: [gonow]

  createbucket:
    image: minio/mc:latest
    container_name: gonow-createbucket
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set gonow http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing gonow/gonow-development;
      mc anonymous set download gonow/gonow-development;
      exit 0;
      "
    networks: [gonow]

volumes:
  gonow-postgres-data:
  gonow-redis-data:
  gonow-minio-data:

networks:
  gonow:
    name: gonow-network
